name: Test Tk iconbitmap

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test-iconbitmap:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - macos-15-intel
          - macos-26
          - macos-26-intel
        tk:
          - tcl-tk@8
          - tcl-tk@9
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: System info
        run: |
          echo "Runner: ${{ matrix.os }}"
          sw_vers
          uname -a

      - name: Install Tk via Homebrew
        run: |
          brew install ${{ matrix.tk }}
          brew link --overwrite ${{ matrix.tk }}

      - name: Show Tk version
        run: |
          brew info ${{ matrix.tk }} || true
          echo "---"
          tclsh <<< 'puts [info patchlevel]; exit' || echo "tclsh not found"

      - name: Run test script
        run: python3 test_tk_iconbitmap.py
