name: Test

on: [push, pull_request, workflow_dispatch]

env:
  FORCE_COLOR: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: [
          "pypy3.11",
          "3.10",
          "3.11",
          "3.12",
          "3.13",
          "3.14",
          "3.15",
          "3.13t",
          "3.14t",
          "3.15t",
          "3.15.0-alpha.1",
          "3.15.0-alpha.2",
          "3.15.0-alpha.3",
          "3.15.0-alpha.4",
          "3.15.0-alpha.5",
        ]
        os: [
          windows-2022,
          windows-2025,
          macOS-latest,
          ubuntu-22.04,
          ubuntu-24.04,
          ubuntu-22.04-arm,
          ubuntu-24.04-arm,
        ]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
          cache: pip
          cache-dependency-path: .github/workflows/test.yml

      - name: Test
        run: |
          python --version --version
          python run_test_bz2.py
